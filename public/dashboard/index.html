<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Monitor Dashboard</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel Standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- PropTypes (required by Recharts) -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

  <!-- Recharts for graphs -->
  <script src="https://unpkg.com/recharts@2.5.0/umd/Recharts.js"></script>
  
  <!-- date-fns for time formatting -->
  <script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f7fa;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    
    .status-up { background-color: #10b981; }
    .status-down { background-color: #ef4444; }
    .status-unknown { background-color: #9ca3af; }
    
    .monitor-card {
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .monitor-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }
    
    .uptime-bar {
      height: 40px;
      display: flex;
      gap: 2px;
      align-items: flex-end;
    }
    
    .uptime-bar-item {
      flex: 1;
      background: #10b981;
      border-radius: 2px 2px 0 0;
      transition: opacity 0.2s;
      min-width: 3px;
    }
    
    .uptime-bar-item:hover {
      opacity: 0.8;
    }
    
    .uptime-bar-item.down {
      background: #ef4444;
    }
    
    .uptime-bar-item.unknown {
      background: #e5e7eb;
    }
    
    .loading-spinner {
      border: 3px solid #f3f4f6;
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-in {
      animation: fadeIn 0.2s ease-out;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- App Components -->
  <script type="text/babel" src="./app.jsx"></script>
</body>
</html>
